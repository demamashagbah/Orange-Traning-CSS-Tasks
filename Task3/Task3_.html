<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Page</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e0e0ff; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-card {
            background-color: #7a7cc2; 
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 32px;
        }

      
        .name-row {
            display: flex;
            gap: 15px; /* Space between First and Last name */
            margin-bottom: 15px;
        }

        .input-group {
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box; /* Crucial for width alignment */
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 10px;
        }

        .btn-signup {
            width: 100%;
            padding: 15px;
            background-color: #939598; 
            color: #ccc; 
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .login-link {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .login-link a {
            color: white;
            text-decoration: underline;
        }

        .copyright {
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h1>Sign Up</h1>
        
        <form action="#">
            <div class="name-row">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Confirm Password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">I accept the Terms of Use & Privacy Policy</label>
            </div>

            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="#">Login here</a>
        </div>

        <div class="copyright">
            Copyright © YourCompany.com
        </div>
    </div>

</body>
</html>
