<!DOCTYPE html>
<html>
<head>
    <title>Member Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #9c00e6; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        
        .login-container {
            background-color: white;
            width: 800px; 
            display: flex; 
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 50px;
        }

      
        .image-side {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-side img {
            max-width: 80%;
            height: auto;
        }

       
        .form-side {
            flex: 1; 
            padding-left: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

       
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px; 
            border: none;
            background-color: #e6e6e6;
            border-radius: 30px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        /* Button Styling */
        .btn-login {
            background-color: #26d33f; 
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            width: 400px;
           
        }

       
        /* Footer links */
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: #26d33f;
            text-decoration: none;
            font-weight: bold;
        }

    

    </style>
</head>

        <div class="form-side">
            <h1>Member Login</h1>
            
            <form action="#">
                <div class="input-group">
                    <input type="email" placeholder="Email">
                </div>

                <div class="input-group">
                    <input type="password" placeholder="••••••">
                </div>
                <div style="display: flex; justify-content: center;";>
                     <button type="submit" class="btn-login">Login</button>
                </div>
               
            </form>

            <div class="footer-links">
                <p>Forgot <a href="#">Username / Password?</a></p>
