<!DOCTYPE html>
<html>
<head>
    <title>My Website Banner</title>
    <style>
     
        body {
            margin: 0;
            font-family: 'Times New Roman', Times, serif; 
            background-color: #e5ae61; 
        }

   
        .banner {
            background-color: #8b4513;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid #000;
        }

        .banner h1 {
            font-size: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: #000;
        }

       
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px 0;
        }

        nav a {
            text-decoration: none;
            color: #006400; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .main-content {
            padding: 0 40px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #4b2c00; 
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>This is My Banner Text</h1>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Info</a>
        <a href="#">Contact</a>
        <a href="#">Hubpages</a>
    </nav>

    <div class="main-content">
        <h2>This Is My Paragraph Header</h2>
        <p>This is where I am going to put useful and informative text about my website.</p>
        <p>This is where I am can place even more information about my website.</p>
        <p>This is where I can place a copyright logo like this &copy;</p>
    </div>

</body>
</html>
