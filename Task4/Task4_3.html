<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Form</title>
    <style>
     
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-card {
            background-color: #2abfff; 
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: #999;
        }

     
        textarea {
            height: 120px;
            resize: none; 
        }
        .btn-container {
            text-align: left; 
            margin-top: 10px;
        }

        .send-btn {
            background-color: #0056b3; /* Darker blue button */
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
        }

    
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Contact Us</h2>
        
        <form action="#">
            <div class="form-group">
                <input type="text" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <input type="email" placeholder="Email" required>
            </div>
            
            <div class="form-group">
                <input type="tel" placeholder="tel: XXX XXX XXXX">
            </div>
            
            <div class="form-group">
                <textarea placeholder="Your Message Here..."></textarea>
            </div>
            
            <div class="btn-container">
                <button type="submit" class="send-btn">Send</button>
            </div>
        </form>
    </div>

</body>
</html>
