<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox and Grid Exercises</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h2 {
            background: #333;
            color: white;
            padding: 10px;
            margin-top: 50px;
        }

        .ex-split-screen {
            display: flex;
            height: 400px;
            color: white;
            font-size: 2rem;
            text-align: center;
        }
        .ex-split-screen .part {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .orange-part { background-color: orange; }
        .blue-part { background-color: blue; }


        .ex-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: white;
            padding: 10px;
        }
        .ex-gallery img {
            width: 32%; 
            height: 200px;
            object-fit: cover;
        }

    
        .ex-numbered-grid {
            display: flex;
            flex-wrap: wrap;
            border: 5px solid goldenrod;
            background-color: white;
        }
        .num-box {
            width: 25%; /* 4 columns */
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
        }

        .c1 { background-color: #1abc9c; } .c2 { background-color: #3498db; }
        .c3 { background-color: #9b59b6; } .c4 { background-color: #34495e; }
        .c5 { background-color: #f1c40f; } .c6 { background-color: #e67e22; }
        .c7 { background-color: #e74c3c; } .c8 { background-color: #bdc3c7; }
        .c9 { background-color: #2ecc71; } .c10 { background-color: #16a085; }


        .ex-grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 80px 300px 100px;
            gap: 15px;
            background: white;
            padding: 10px;
        }
        .grid-item { color: white; }
        .header { grid-column: 1 / span 2; background: black; }
        .main { background: orange; }
        .sidebar { background: green; }
        .footer { grid-column: 1 / span 2; background: blue; }

        .ex-stripes {
            display: flex;
            height: 400px;
            border: 5px solid goldenrod;
        }
        .stripe {
            flex: 1;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            font-size: 3rem;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Exercise #1 - Split Screen (Flex)</h2>
    <div class="ex-split-screen">
        <div class="part orange-part">First Part</div>
        <div class="part blue-part">Second Part</div>
    </div>

    <h2>Exercise #2 - Image Gallery</h2>
    <div class="ex-gallery">
        <img src="https://picsum.photos/400/300?random=1" alt="Nature">
        <img src="https://picsum.photos/400/300?random=2" alt="Lake">
        <img src="https://picsum.photos/400/300?random=3" alt="Forest">
        <img src="https://picsum.photos/400/300?random=4" alt="City">
        <img src="https://picsum.photos/400/300?random=5" alt="Flowers">
        <img src="https://picsum.photos/400/300?random=6" alt="Piano">
        <img src="https://picsum.photos/400/300?random=7" alt="Violin">
        <img src="https://picsum.photos/400/300?random=8" alt="Guitar">
    </div>

    <h2>Exercise #3 - Numbered Flex Wrap</h2>
    <div class="ex-numbered-grid">
        <div class="num-box c1">1</div>
        <div class="num-box c2">2</div>
        <div class="num-box c3">3</div>
        <div class="num-box c4">4</div>
        <div class="num-box c5">5</div>
        <div class="num-box c6">6</div>
        <div class="num-box c7">7</div>
        <div class="num-box c8">8</div>
        <div class="num-box c9">9</div>
        <div class="num-box c10">10</div>
    </div>

    <h2>Exercise #4 - Grid Layout</h2>
    <div class="ex-grid-layout">
        <div class="grid-item header"></div>
        <div class="grid-item main"></div>
        <div class="grid-item sidebar"></div>
        <div class="grid-item footer"></div>
    </div>

    <h2>Exercise #5 - Vertical Flex Stripes</h2>
    <div class="ex-stripes">
        <div class="stripe" style="background: green;">1</div>
        <div class="stripe" style="background: yellow; color: white;">2</div>
        <div class="stripe" style="background: purple;">3</div>
        <div class="stripe" style="background: grey;">4</div>
        <div class="stripe" style="background: blue;">5</div>
        <div class="stripe" style="background: orange;">6</div>
        <div class="stripe" style="background: pink;">7</div>
        <div class="stripe" style="background: red;">8</div>
        <div class="stripe" style="background: brown;">9</div>
    </div>

</body>
</html>
