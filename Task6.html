<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox and Grid Exercises</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h2 {
            background: #333;
            color: white;
            padding: 10px;
            margin-top: 50px;
        }

        .ex-split-screen {
            display: flex;
            height: 400px;
            color: white;
            font-size: 2rem;
            text-align: center;
        }
        .ex-split-screen .part {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .orange-part { background-color: orange; }
        .blue-part { background-color: blue; }


        .ex-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: white;
            padding: 10px;
        }
        .ex-gallery img {
            width: 32%; 
            height: 200px;
            object-fit: cover;
        }

    
        .ex-numbered-grid {
            display: flex;
            flex-wrap: wrap;
            border: 5px solid goldenrod;
            background-color: white;
        }
        .num-box {
            width: 25%; /* 4 columns */
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
        }

        .c1 { background-color: #1abc9c; } .c2 { background-color: #3498db; }
        .c3 { background-color: #9b59b6; } .c4 { background-color: #34495e; }
        .c5 { background-color: #f1c40f; } .c6 { background-color: #e67e22; }
        .c7 { background-color: #e74c3c; } .c8 { background-color: #bdc3c7; }
        .c9 { background-color: #2ecc71; } .c10 { background-color: #16a085; }


        .ex-grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 80px 300px 100px;
            gap: 15px;
            background: white;
            padding: 10px;
        }
        .grid-item { color: white; }
        .header { grid-column: 1 / span 2; background: black; }
        .main { background: orange; }
        .sidebar { background: green; }
        .footer { grid-column: 1 / span 2; background: blue; }

        .ex-stripes {
            display: flex;
            height: 400px;
            border: 5px solid goldenrod;
        }
        .stripe {
            flex: 1;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            font-size: 3rem;
            color: white;
        }
    </style>
</head>
<body>
