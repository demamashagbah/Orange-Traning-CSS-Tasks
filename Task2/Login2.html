<!DOCTYPE html>
<html>
    <head>
        <title>
            Login_2 
        </title>
        <style>
            body{
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, sans-serif;
                background-color: #ffffff;
                display: flex;
                flex-direction: column;
            }
            nav{ 
                display: flex;
                flex-direction: row;
                justify-content:space-between;
                align-items:center;
                border-bottom: 1px solid #f0f0f0;
                background-color: #f8f9fa;

            }
            .logo{
                font-weight: bold;
                font-size: 20px;
                color: #666;
            }
            .nav-links a{
                text-decoration: none;
                margin-left: 15px;
                font-size: 14px;
                color: #777;
            }
            .main-content{
                flex-grow: 1; 
                display: flex;
                justify-content: center;
                align-items: center;
                padding-bottom: 100px;
            }
            input{
                width: 100%;
                padding: 10px;
                box-sizing: border-box; 
                border: 1px solid #ddd;
                border-radius: 4px;
                font-size: 16px;
            }
            .login-box{
                width:320px;
            }
            .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
          .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #61a5ff; 
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 20px;
        }
        </style>
    </head>
    <body>
        <nav>
             <div  class="logo">Scratch</div>
             <div  class="nav-links">
                <a href="#">Signup</a>
                <a href="#"style="color: black;">Login</a>
             </div>
        </nav>

        <div class="main-content">
            <div class="login-box">
                <form action="www.example.com" method="post">
                 <div class="form-input">
                    <label>Eamil</label>
                    <input type="email" name="email">
                 </div>   
                 <div class="form-input">
                    <label>Password</label>
                    <input type="password" name="password">
                 </div>
                <input class ="btn-login"type="submit" value="Login">
            </div>      
            </form>
        </div>
    </body>
</html>
